<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPASS● | Global Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1012;
            --accent: #e67e22;
            --text: #ffffff;
            --card-radius: 20px;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; /* Prevent vertical body scroll */
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=1470') center/cover;
            z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION --- */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 60px; background: rgba(14, 16, 18, 0.8);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-weight: 900; letter-spacing: 6px; font-size: 24px; color: var(--accent); cursor: pointer; }
        .mode-tag { font-size: 10px; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; color: var(--accent); }

        .header-section { padding: 120px 60px 0 60px; position: relative; z-index: 10; }
        .breadcrumb { font-size: 11px; font-weight: 900; color: var(--accent); cursor: pointer; margin-bottom: 10px; display: none; }
        .title-display { font-size: clamp(40px, 8vw, 90px); font-weight: 900; letter-spacing: -4px; margin: 0; text-transform: uppercase; }

        /* --- THE DYNAMO ENGINE (CSS) --- */
        .grid {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100vw;
            height: 70vh;
            padding: 0 45vw; /* Initial centering */
            align-items: center;
            gap: 50px;
            scroll-snap-type: x proximity;
            perspective: 1500px; /* Essential for 3D depth */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .grid::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 350px; /* DO NOT SHRINK */
            height: 500px;
            background-size: cover;
            background-position: center;
            border-radius: var(--card-radius);
            position: relative;
            cursor: pointer;
            scroll-snap-align: center;
            transform-style: preserve-3d;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.9)); 
            border-radius: var(--card-radius); 
        }

        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 30px; z-index: 2;
        }
        .card-title { font-weight: 900; font-size: 28px; margin: 0; text-transform: uppercase; }
        .card-sub { font-size: 10px; color: var(--accent); letter-spacing: 2px; font-weight: 700; }

        /* Edit Styles */
        .place-input { background: transparent; border: none; color: white; font-weight: 900; font-size: 24px; width: 100%; outline: none; }
        .place-desc { background: transparent; border: none; color: #ccc; width: 100%; height: 60px; resize: none; outline: none; margin-top: 10px; font-family: inherit; }

        .fab { position: fixed; bottom: 40px; right: 40px; background: var(--accent); color: white; width: 60px; height: 60px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border: none; z-index: 100; box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .navbar { padding: 15px 25px; }
            .header-section { padding: 100px 25px 0 25px; }
            .grid { padding: 0 20vw; gap: 30px; }
            .card { flex: 0 0 280px; height: 420px; }
            .title-display { font-size: 40px; letter-spacing: -1px; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <nav class="navbar">
        <div class="logo" onclick="smoothGoBack()">COMPASS●</div>
        <div id="mode-indicator" class="mode-tag" style="display:none">ADMIN</div>
    </nav>

    <header class="header-section">
        <div id="breadcrumb" class="breadcrumb" onclick="smoothGoBack()">← BACK TO GLOBAL</div>
        <h1 id="view-title" class="title-display">WORLD ARCHIVE</h1>
    </header>
    
    <main id="main-grid" class="grid"></main>

    <button id="add-btn" class="fab" onclick="createNewItem()">+</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const mainGrid = document.getElementById('main-grid');
        const viewTitle = document.getElementById('view-title');
        const breadcrumb = document.getElementById('breadcrumb');

        // --- DYNAMO ENGINE ---
        function updateDynamo() {
            const cards = document.querySelectorAll('.card');
            const centerX = window.innerWidth / 2;

            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardMid = rect.left + rect.width / 2;
                const distance = (cardMid - centerX) / centerX;

                const rotateY = distance * 45; 
                const translateZ = Math.abs(distance) * -150;
                const scale = 1 - (Math.abs(distance) * 0.1);

                card.style.transform = `rotateY(${rotateY}deg) translateZ(${translateZ}px) scale(${scale})`;
                card.style.opacity = 1 - Math.abs(distance) * 0.5;
            });
        }

        mainGrid.addEventListener('scroll', () => requestAnimationFrame(updateDynamo));
        
        mainGrid.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768) {
                e.preventDefault();
                mainGrid.scrollLeft += e.deltaY;
            }
        }, { passive: false });

        // --- FIREBASE & STATE ---
        const urlParams = new URLSearchParams(window.location.search);
        const isEditing = urlParams.get('edit') === 'true';
        if(isEditing) {
            document.getElementById('mode-indicator').style.display = 'block';
            document.getElementById('add-btn').style.display = 'flex';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDhMAFYZ1IxT6Eni-O5iaeo7bnWF5BCudU",
            authDomain: "travelcost-77179.firebaseapp.com",
            projectId: "travelcost-77179",
            storageBucket: "travelcost-77179.firebasestorage.app",
            messagingSenderId: "1054821903994",
            appId: "1:1054821903994:web:7b898875d0bef2e6be15c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allData = [];
        let currentMode = 'COUNTRIES';
        let activeCountry = '';

        // --- CORE FUNCTIONS ---
        async function loadData() {
            const doc = await db.collection("journals").doc("final_archive").get();
            if (doc.exists) allData = doc.data().data || [];
            renderCountries();
        }

        function renderCountries() {
            currentMode = 'COUNTRIES';
            mainGrid.innerHTML = '';
            viewTitle.innerText = "WORLD ARCHIVE";
            breadcrumb.style.display = 'none';

            const summary = {};
            allData.forEach(item => {
                if (!summary[item.country]) summary[item.country] = { name: item.country, img: item.img, count: 0 };
                summary[item.country].count++;
            });

            Object.values(summary).forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${c.img}')`;
                card.onclick = () => renderPlaces(c.name);
                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-sub">${c.count} MEMORIES</div>
                        <h2 class="card-title">${c.name}</h2>
                    </div>`;
                mainGrid.appendChild(card);
            });
            setTimeout(updateDynamo, 100);
        }

        function renderPlaces(country) {
            currentMode = 'PLACES';
            activeCountry = country;
            mainGrid.innerHTML = '';
            viewTitle.innerText = country;
            breadcrumb.style.display = 'block';
            mainGrid.scrollLeft = 0;

            allData.filter(d => d.country === country).forEach(p => {
                const idx = allData.indexOf(p);
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${p.img}')`;
                card.innerHTML = `
                    <div class="card-content">
                        ${isEditing ? `<input class="place-input" value="${p.name}" oninput="allData[${idx}].name=this.value; saveData()">` : `<h2 class="card-title">${p.name}</h2>`}
                        ${isEditing ? `<textarea class="place-desc" oninput="allData[${idx}].notes=this.value; saveData()">${p.notes}</textarea>` : `<p style="font-size:13px; color:#ddd;">${p.notes}</p>`}
                        ${isEditing ? `<button onclick="deleteItem(${idx})" style="margin-top:10px; background:none; border:1px solid red; color:red; cursor:pointer; font-size:10px; padding:4px;">DELETE</button>` : ''}
                    </div>`;
                mainGrid.appendChild(card);
            });
            setTimeout(updateDynamo, 100);
        }

        function smoothGoBack() {
            if (currentMode === 'COUNTRIES') return;
            renderCountries();
        }

        function createNewItem() {
            let country = activeCountry || prompt("Country Name:").toUpperCase();
            if(!country) return;
            allData.push({ country, name: "New Place", notes: "", img: "https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=1470" });
            saveData();
            renderPlaces(country);
        }

        function deleteItem(idx) {
            if(confirm("Erase memory?")) {
                const c = allData[idx].country;
                allData.splice(idx, 1);
                saveData();
                allData.some(d => d.country === c) ? renderPlaces(c) : renderCountries();
            }
        }

        async function saveData() { if(isEditing) await db.collection("journals").doc("final_archive").set({ data: allData }); }

        window.onload = loadData;
    </script>
</body>
</html>
