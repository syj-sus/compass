<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPASS ● | Global Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0e1012; --accent: #e67e22; --text: #ffffff; --card-radius: 30px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Modified body to allow scrolling on Desktop */
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; 
            overflow-y: auto; 
            min-height: 100vh; 
        }
        
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=1470') center/cover; z-index: -1; }
        
        .navbar { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 30px 60px; background: linear-gradient(to bottom, rgba(14,16,18,1), transparent); }
        .logo { font-weight: 900; letter-spacing: 6px; font-size: 24px; color: var(--accent); cursor: pointer; }
        .dot { display: inline-block; margin-left: 10px; animation: swing 2.5s ease-in-out infinite; }
        @keyframes swing { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(12px); filter: drop-shadow(-5px 0 10px var(--accent)); } }

        .search-container { position: absolute; right: 60px; top: 85px; z-index: 101; }
        .search-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; font-family: inherit; font-size: 10px; letter-spacing: 2px; padding: 5px; outline: none; width: 150px; text-align: right; transition: all 0.3s ease; }
        .search-input:focus { width: 250px; border-bottom-color: var(--accent); }

        .mode-tag { font-size: 10px; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; color: var(--accent); display: none; margin-left: 20px;}
        .save-sync-btn { background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; font-size: 10px; font-weight: 900; letter-spacing: 2px; border: none; cursor: pointer; display: none; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); transition: all 0.3s ease; margin-left: 15px; }

        .header-section { padding: 140px 60px 40px 60px; z-index: 10; position: relative; }
        .breadcrumb { font-size: 10px; font-weight: 900; color: var(--accent); cursor: pointer; margin-bottom: 8px; letter-spacing: 2px; display: none; }
        .title-display { font-size: clamp(30px, 6vw, 70px); font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: uppercase; }

        /* DESKTOP GRID: Side-by-side layout */
        .grid { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px 60px 150px; /* Padding for bottom UI */
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }

        .card { 
            position: relative; 
            width: 320px; 
            height: 460px; 
            background-size: cover; 
            background-position: center; 
            background-color: #16181b; 
            border-radius: var(--card-radius); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease, border 0.3s ease; 
            cursor: pointer; 
            user-select: none; 
            border: 1px solid rgba(255,255,255,0.1); 
            flex-shrink: 0;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(0,0,0,0.9)); border-radius: var(--card-radius); }
        .card-content { position: absolute; bottom: 0; padding: 30px; z-index: 2; width: 100%; pointer-events: none; }
        .card-content.admin-active { pointer-events: auto; }

        .admin-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; width: 100%; font-size: 11px; margin-bottom: 5px; border-radius: 4px; outline: none; }
        .place-title { font-weight: 900; font-size: 24px; margin: 0; text-transform: uppercase; }
        .place-notes { font-size: 13px; opacity: 0.7; line-height: 1.4; margin-top: 8px; }

        .compass-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 200px; text-align: center; z-index: 200; background: rgba(14,16,18,0.8); padding: 10px; border-radius: 20px; backdrop-filter: blur(10px); }
        .fab { position: fixed; bottom: 40px; right: 40px; background: var(--accent); color: white; width: 60px; height: 60px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border: none; z-index: 101; }

        /* MOBILE OVERRIDE: Restore Stacking & Swiping */
        @media (max-width: 768px) { 
            body { overflow: hidden; }
            .grid { 
                position: absolute; 
                top: 55%; 
                left: 50%; 
                transform: translate(-50%, -50%); 
                width: 100vw; 
                height: 60vh; 
                display: block; 
                padding: 0;
            } 
            .card { 
                position: absolute; 
                left: 50%;
                margin-left: -140px; /* Center 280px card */
                width: 280px; 
                height: 400px; 
            } 
            .header-section { padding: 120px 30px 0; } 
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <nav class="navbar">
        <div class="logo" onclick="smoothGoBack()">COMPASS<span class="dot">●</span></div>
        <div style="display: flex; align-items: center;">
            <div id="mode-indicator" class="mode-tag">ADMIN</div>
            <button id="save-all-btn" class="save-sync-btn" onclick="saveToFirebase()">SYNC ARCHIVE</button>
        </div>
    </nav>

    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="SEARCH..." oninput="handleSearch()">
    </div>

    <header class="header-section">
        <div id="breadcrumb" class="breadcrumb" onclick="smoothGoBack()">← RETURN</div>
        <h1 id="view-title" class="title-display">WORLD ARCHIVE</h1>
    </header>

    <main id="main-grid" class="grid"></main>

    <div class="compass-container">
        <div id="counter" style="font-size: 10px; letter-spacing: 4px; opacity: 0.5;">01 / 01</div>
    </div>

    <button id="add-btn" class="fab" onclick="createNewItem()">+</button>
    <input type="file" id="image-upload" accept="image/*,image/webp" style="display:none" onchange="handleFileUpload(event)">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const mainGrid = document.getElementById('main-grid');
    const firebaseConfig = {
        apiKey: "AIzaSyDhMAFYZ1IxT6Eni-O5iaeo7bnWF5BCudU",
        authDomain: "travelcost-77179.firebaseapp.com",
        projectId: "travelcost-77179",
        storageBucket: "travelcost-77179.firebasestorage.app",
        messagingSenderId: "1054821903994",
        appId: "1:1054821903994:web:7b898875d0bef2e6be15c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allData = [], currentMode = 'COUNTRIES', activeCountry = '';
    let isEditing = false, currentIndex = 0, pendingUploadIdx = null;
    let lastViewedCountry = '';

    const COMPASS_PLACEHOLDER = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIwIiBoZWlnaHQ9IjQ2MCIgdmlld0JveD0iMCAwIDMyMCA0NjAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjMyMCIgaGVpZ2h0PSI0NjAiIGZpbGw9IiMxNjE4MWIiLz48Y2lyY2xlIGN4PSIxNjAiIGN5PSIyMzAiIHI9IjYwIiBmaWxsPSJ1cmwoI3B1bHNlKSIgZmlsbC1vcGFjaXR5PSIwLjA1Ii8+PGNpcmNsZSBjeD0iMTYwIiBjeT0iMjMwIiByPSIxMCIgZmlsbD0iI2U2N2UyMiIgZmlsbC1vcGFjaXR5PSIwLjYiLz48dGV4dCB4PSIxNjAiIHk9IjI3MCIgZmlsbD0iI2U2N2UyMiIgZmlsbC1vcGFjaXR5PSIwLjQiIGZvbnQtZmFtaWx5PSJNb250c2VycmF0IiBmb250LXNpemU9IjgiIGZvbnQtd2VpZ2h0PSI5MDAiIGxldHRlci1zcGFjaW5nPSI0IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5BV0FJVElORyBEQVRBPC90ZXh0PjxkZWZzPjxyYWRpYWxHcmFkaWVudCBpZD0icHVsc2UiIGN4PSIwIiBjeT0iMCIgcj0iMSIgZ3JhZGllbnRVbml0cz0idXNlclNwYWNlT25Vc2UiIHRyYW5zZm9ybT0idHJhbnNsYXRlKDE2MCAyMzApIHJvdGF0ZSg5MCkgc2NhbGUoNjApIj48c3RvcCBzdG9wLWNvbG9yPSIjZTY3ZTIyIi8+PHN0b3Agb2Zmc2V0PSIxIiBzdG9wLWNvbG9yPSIjZTY3ZTIyIiBzdG9wLW9wYWNpdHk9IjAiLz48L3JhZGlhbEdyYWRpZW50PjwvZGVmcz48L3N2Zz4=";

    function checkAdminStatus() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('edit') === 'true') {
            const pass = prompt("Admin Password:");
            if(pass === "/compass0105") {
                isEditing = true;
                document.getElementById('mode-indicator').style.display = 'block';
                document.getElementById('add-btn').style.display = 'flex';
                document.getElementById('save-all-btn').style.display = 'block';
            }
        }
    }

    async function loadData() {
        checkAdminStatus();
        const snapshot = await db.collection("journals").get();
        let loaded = [];
        snapshot.forEach(doc => { if(doc.data().data) loaded = [...loaded, ...doc.data().data]; });
        allData = loaded;
        renderCountries();
    }

    function renderCountries(filter = "") {
        currentMode = 'COUNTRIES';
        if (!lastViewedCountry) currentIndex = 0; 
        
        mainGrid.innerHTML = '';
        document.getElementById('view-title').innerText = "WORLD ARCHIVE";
        document.getElementById('breadcrumb').style.display = 'none';

        const summary = {};
        allData.forEach(item => {
            if (!summary[item.country]) summary[item.country] = { name: item.country, img: item.img || COMPASS_PLACEHOLDER, count: 0 };
            summary[item.country].count++;
        });

        const countryList = Object.values(summary);
        const filtered = countryList.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
        
        if (lastViewedCountry) {
            const foundIdx = filtered.findIndex(c => c.name === lastViewedCountry);
            if (foundIdx !== -1) currentIndex = foundIdx;
            lastViewedCountry = '';
        }

        filtered.forEach((c, i) => {
            const card = createCardElement(c.img, `
                <div style="font-size:10px; color:var(--accent); font-weight:700;">${c.count} MEMORIES</div>
                <h2 class="place-title">${c.name}</h2>
            `, () => {
                lastViewedCountry = c.name;
                renderPlaces(c.name);
            }, i);
            mainGrid.appendChild(card);
        });
        updateStack();
    }

    function renderPlaces(country, filter = "") {
        currentMode = 'PLACES'; activeCountry = country; currentIndex = 0;
        mainGrid.innerHTML = '';
        document.getElementById('view-title').innerText = country;
        document.getElementById('breadcrumb').style.display = 'block';

        const filtered = allData.filter(p => p.country === country && p.name.toLowerCase().includes(filter.toLowerCase()));

        filtered.forEach((p, i) => {
            const dataIdx = allData.indexOf(p);
            const img = p.img || COMPASS_PLACEHOLDER;
            let content = isEditing ? `
                <div class="card-content admin-active">
                    <button onclick="triggerUpload(${dataIdx})" style="width:100%; background:var(--accent); border:none; color:white; padding:10px; border-radius:4px; margin-bottom:10px; font-weight:900; font-size:10px; cursor:pointer;">UPLOAD PHOTO</button>
                    <input class="admin-input" value="${p.name}" onchange="updateItem(${dataIdx}, 'name', this.value)">
                    <textarea class="admin-input" style="height:60px" onchange="updateItem(${dataIdx}, 'notes', this.value)">${p.notes}</textarea>
                    <button onclick="deleteItem(${dataIdx})" style="width:100%; background:#c0392b; color:white; border:none; padding:8px; border-radius:4px; font-weight:900; margin-top:5px; cursor:pointer;">DELETE</button>
                </div>` : `
                <div class="card-content">
                    <h2 class="place-title">${p.name}</h2>
                    <p class="place-notes">${p.notes}</p>
                </div>`;
            
            const card = createCardElement(img, content, null, i);
            mainGrid.appendChild(card);
        });
        updateStack();
    }

    function createCardElement(img, html, onClick, index) {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.backgroundImage = `url('${img}')`;
        card.innerHTML = html.includes('card-content') ? html : `<div class="card-content">${html}</div>`;
        
        let startX = 0, currentX = 0, isDragging = false;

        const start = (e) => {
            // Dragging/Swiping logic only enabled on mobile
            if(window.innerWidth > 768 || index !== currentIndex) return;
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
            isDragging = true;
            startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            card.style.transition = 'none';
        };

        const move = (e) => {
            if(!isDragging) return;
            const x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
            currentX = x - startX;
            const rotate = currentX / 12;
            card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
        };

        const end = () => {
            if(!isDragging) return;
            isDragging = false;
            card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            if (Math.abs(currentX) > 100) {
                swipeCard(currentX > 0 ? 1 : -1);
            } else {
                updateStack();
            }
            currentX = 0;
        };

        card.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        card.addEventListener('touchstart', start, {passive: true});
        window.addEventListener('touchmove', move, {passive: true});
        window.addEventListener('touchend', end);

        if(onClick && !isEditing) card.onclick = onClick;
        return card;
    }

    function swipeCard(direction) {
        const cards = document.querySelectorAll('.card');
        const topCard = cards[currentIndex];
        if(!topCard) return;
        topCard.style.opacity = '0';
        topCard.style.transform = `translateX(${direction * 600}px) rotate(${direction * 45}deg)`;
        topCard.style.pointerEvents = 'none';
        currentIndex++;
        if(currentIndex >= cards.length) currentIndex = 0; 
        setTimeout(updateStack, 300);
    }

    function updateStack() {
        const cards = document.querySelectorAll('.card');
        if(cards.length === 0) { document.getElementById('counter').innerText = "00 / 00"; return; }
        
        document.getElementById('counter').innerText = `${String(currentIndex + 1).padStart(2, '0')} / ${String(cards.length).padStart(2, '0')}`;

        if (window.innerWidth <= 768) {
            // MOBILE: STACKING LOGIC
            cards.forEach((card, i) => {
                card.style.zIndex = cards.length - i;
                if (i < currentIndex) {
                    card.style.opacity = '0'; card.style.pointerEvents = 'none';
                } else if (i === currentIndex) {
                    card.style.opacity = '1'; card.style.transform = `translateX(0) translateY(0) scale(1)`; card.style.pointerEvents = 'auto';
                } else {
                    const diff = i - currentIndex;
                    const scale = Math.max(0, 1 - (diff * 0.04));
                    const y = diff * 12;
                    card.style.opacity = diff > 4 ? '0' : '1';
                    card.style.transform = `translateY(${y}px) scale(${scale})`;
                    card.style.pointerEvents = 'none';
                }
            });
        } else {
            // DESKTOP: CLEAR GRID RESET
            cards.forEach((card) => {
                card.style.opacity = '1';
                card.style.transform = 'none';
                card.style.pointerEvents = 'auto';
                card.style.zIndex = '1';
            });
        }
    }

    // Refresh layout on screen resize
    window.addEventListener('resize', updateStack);

    function handleSearch() {
        const q = document.getElementById('search-bar').value;
        if (currentMode === 'COUNTRIES') renderCountries(q);
        else renderPlaces(activeCountry, q);
    }

    function smoothGoBack() {
        if (currentMode === 'PLACES') { lastViewedCountry = activeCountry; renderCountries(); }
        else { renderCountries(); }
    }

    function updateItem(idx, key, val) { allData[idx][key] = val; }

    async function saveToFirebase() {
        const btn = document.getElementById('save-all-btn');
        btn.innerText = "SYNCING...";
        try {
            const countries = [...new Set(allData.map(d => d.country))];
            for (const c of countries) {
                const items = allData.filter(d => d.country === c);
                await db.collection("journals").doc(c.toLowerCase().replace(/\s/g, '_')).set({ data: items });
            }
            btn.innerText = "SAVED ✓";
            setTimeout(() => btn.innerText = "SYNC ARCHIVE", 2000);
        } catch(e) { btn.innerText = "ERROR"; }
    }

    function triggerUpload(idx) { pendingUploadIdx = idx; document.getElementById('image-upload').click(); }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 1200) { h *= 1200 / w; w = 1200; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                const base64 = canvas.toDataURL('image/webp', 0.75);
                updateItem(pendingUploadIdx, 'img', base64);
                document.querySelectorAll('.card')[currentIndex].style.backgroundImage = `url('${base64}')`;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function createNewItem() {
        let country = (activeCountry || prompt("ENTER COUNTRY:")).toUpperCase();
        if(!country) return;
        allData.push({ country, name: "NEW LOCATION", notes: "ADD NOTES...", img: COMPASS_PLACEHOLDER });
        renderPlaces(country);
    }

    async function deleteItem(idx) {
        if(confirm("Delete Memory?")) {
            allData.splice(idx, 1);
            const remaining = allData.filter(p => p.country === activeCountry);
            remaining.length > 0 ? renderPlaces(activeCountry) : renderCountries();
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
